# Render.com — one-click deploy: paste this in Dashboard → New → Blueprint
services:
  - type: web
    name: boss-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn chat_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: REPORT_EMAIL_FROM
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: CONTACT_EMAIL_TO
        optional: true
      - key: DASHBOARD_PASSWORD
        optional: true
